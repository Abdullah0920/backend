<!DOCTYPE html>
<html>
<head>
    <title>Submit Form</title>
</head>
<body>
    <h1>Submit Form</h1>
    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="post" action="/submit">
        <label>Name:</label>
        <input type="text" name="name" /><br><br>
        <label>Email:</label>
        <input type="email" name="email" /><br><br>
        <input type="submit" value="Submit" />
    </form>
</body>
</html>
